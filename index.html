<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai-study · Catherine</title>
  <meta name="description" content="Catherine의 ai-study 작업 공간" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1C1A17;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
    }

    .fallback {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #F4EFE6;
      color: #1C1A17;
      padding: 32px;
      text-align: center;
    }

    .fallback.visible {
      display: flex;
    }

    .fallback h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0;
    }

    .fallback p {
      font-size: 15px;
      color: #5C544A;
      max-width: 420px;
      line-height: 1.6;
      margin: 0;
    }

    .fallback a {
      display: inline-block;
      padding: 14px 28px;
      background: #1C1A17;
      color: #F4EFE6;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
      font-size: 15px;
      transition: opacity 0.2s ease;
    }

    .fallback a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <!-- Claude 아티팩트를 전체 화면에 임베드 -->
  <iframe
    class="frame"
    src="https://claude.ai/public/artifacts/5d323e1d-fa37-45e0-ab32-e115c9b0e50e"
    title="ai-study"
    allow="fullscreen; clipboard-write"
    allowfullscreen
  ></iframe>

  <!-- iframe 차단 시 대체 화면 (수동 노출용) -->
  <div id="fallback" class="fallback">
    <h1>콘텐츠를 불러올 수 없습니다</h1>
    <p>
      아래 버튼을 눌러 새 창에서 페이지를 열어주세요.
    </p>
    <a
      href="https://claude.ai/public/artifacts/5d323e1d-fa37-45e0-ab32-e115c9b0e50e"
      target="_blank"
      rel="noopener"
    >
      새 창에서 열기
    </a>
  </div>

</body>
</html>
